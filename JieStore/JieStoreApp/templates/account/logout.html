<!DOCTYPE html>
<html lang="en">
  {% load static %}
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Out</title>
    <link rel="stylesheet" href="{% static 'css/storefront.css' %}" />
    <link rel="stylesheet" href="{% static 'css/auth.css' %}" />
  </head>

  <body>
    <div class="auth-shell">
      <div class="auth-card">
        <h1 class="auth-title">Sign Out</h1>
        <p class="auth-text">Are you sure you want to sign out?</p>
        <form method="post" action="{% url 'account_logout' %}">
          {% csrf_token %}
          {{ redirect_field }}
          <button class="auth-btn" type="submit">Sign Out</button>
        </form>
      </div>
    </div>
  </body>
</html>
